<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SwanBill SIS — Agent Dashboard</title>
<style>
  :root {
    --bg: #0a0a0f;
    --card-bg: #12121a;
    --border: #1e1e2e;
    --accent: #6366f1;
    --accent-dim: #4f46e520;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --blue: #3b82f6;
    --text: #e2e8f0;
    --text-dim: #64748b;
    --text-bright: #f8fafc;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 24px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 20px;
  }
  .header h1 {
    font-size: 18px;
    color: var(--text-bright);
    font-weight: 600;
  }
  .header h1 span { color: var(--accent); }
  .header-stats {
    display: flex;
    gap: 24px;
    font-size: 13px;
  }
  .stat { display: flex; align-items: center; gap: 6px; }
  .stat-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
  }
  .stat-dot.active { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .stat-dot.queued { background: var(--yellow); }
  .stat-dot.done { background: var(--blue); }
  .stat-dot.error { background: var(--red); }

  .summary-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }
  .summary-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    text-align: center;
  }
  .summary-card .num {
    font-size: 28px;
    font-weight: 700;
    color: var(--text-bright);
  }
  .summary-card .label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 4px;
  }

  .category-section {
    margin-bottom: 16px;
  }
  .category-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 16px;
    background: var(--accent-dim);
    border: 1px solid var(--border);
    border-radius: 8px 8px 0 0;
    cursor: pointer;
  }
  .category-header h2 {
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
  }
  .category-header .badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--border);
    color: var(--text-dim);
  }

  .agent-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 10px;
    padding: 10px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 8px 8px;
  }

  .agent-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    transition: border-color 0.2s;
  }
  .agent-card:hover { border-color: var(--accent); }
  .agent-card .top-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .agent-card .system-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-bright);
  }
  .status-badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .status-badge.running {
    background: #22c55e20;
    color: var(--green);
    animation: pulse 2s infinite;
  }
  .status-badge.queued {
    background: #eab30820;
    color: var(--yellow);
  }
  .status-badge.complete {
    background: #3b82f620;
    color: var(--blue);
  }
  .status-badge.error {
    background: #ef444420;
    color: var(--red);
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  .agent-card .task {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 8px;
    line-height: 1.4;
  }
  .agent-card .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .agent-card .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.5s ease;
  }
  .agent-card .meta {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 6px;
  }

  .log-section {
    margin-top: 20px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
  }
  .log-section h3 {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .log-entry {
    font-size: 12px;
    padding: 4px 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 12px;
  }
  .log-entry:last-child { border-bottom: none; }
  .log-time { color: var(--text-dim); min-width: 80px; }
  .log-agent { color: var(--accent); min-width: 120px; }
  .log-msg { color: var(--text); }

  .refresh-note {
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 16px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>🦢 <span>SwanBill SIS</span> — Agent Dashboard</h1>
  <div class="header-stats">
    <div class="stat"><span class="stat-dot active"></span> <span id="count-active">0</span> Active</div>
    <div class="stat"><span class="stat-dot queued"></span> <span id="count-queued">0</span> Queued</div>
    <div class="stat"><span class="stat-dot done"></span> <span id="count-done">0</span> Done</div>
    <div class="stat"><span class="stat-dot error"></span> <span id="count-error">0</span> Errors</div>
    <div class="stat" style="color: var(--text-dim);">Updated: <span id="last-updated">—</span></div>
  </div>
</div>

<div class="summary-bar" id="summary-bar"></div>
<div id="categories-container"></div>

<div class="log-section">
  <h3>📋 Activity Log</h3>
  <div id="activity-log"><div class="log-entry"><span class="log-time">--:--</span><span class="log-agent">System</span><span class="log-msg">Dashboard initialized. Waiting for agent data...</span></div></div>
</div>

<div class="refresh-note">Auto-refreshes every 5 seconds • Data: agent-status.json</div>

<script>
const CATEGORIES_ORDER = ['SIS','LMS','Advancement_Student-Success','Finance','Admissions','Marketing','Communication','IT','Events','Athletics','Analytics'];
const CATEGORY_LABELS = {
  'SIS': 'SIS (Core)',
  'LMS': 'Learning Management',
  'Advancement_Student-Success': 'Advancement / Student Success',
  'Finance': 'Finance',
  'Admissions': 'Admissions',
  'Marketing': 'Marketing',
  'Communication': 'Communication',
  'IT': 'IT / Infrastructure',
  'Events': 'Events',
  'Athletics': 'Athletics',
  'Analytics': 'Analytics'
};

async function fetchStatus() {
  try {
    const r = await fetch('agent-status.json?t=' + Date.now());
    return await r.json();
  } catch(e) {
    return null;
  }
}

function renderDashboard(data) {
  if (!data) return;

  const agents = data.agents || [];
  const counts = { running: 0, queued: 0, complete: 0, error: 0 };
  agents.forEach(a => { counts[a.status] = (counts[a.status] || 0) + 1; });

  document.getElementById('count-active').textContent = counts.running;
  document.getElementById('count-queued').textContent = counts.queued;
  document.getElementById('count-done').textContent = counts.complete;
  document.getElementById('count-error').textContent = counts.error;
  document.getElementById('last-updated').textContent = data.lastUpdated ? new Date(data.lastUpdated).toLocaleTimeString() : '—';

  // Summary bar
  const summaryHtml = CATEGORIES_ORDER.map(cat => {
    const catAgents = agents.filter(a => a.category === cat);
    const done = catAgents.filter(a => a.status === 'complete').length;
    return `<div class="summary-card">
      <div class="num">${done}/${catAgents.length || '—'}</div>
      <div class="label">${CATEGORY_LABELS[cat] || cat}</div>
    </div>`;
  }).join('');
  document.getElementById('summary-bar').innerHTML = summaryHtml;

  // Categories
  let catHtml = '';
  CATEGORIES_ORDER.forEach(cat => {
    const catAgents = agents.filter(a => a.category === cat);
    if (catAgents.length === 0) {
      catHtml += `<div class="category-section">
        <div class="category-header"><h2>${CATEGORY_LABELS[cat] || cat}</h2><span class="badge">No agents yet</span></div>
      </div>`;
      return;
    }
    const running = catAgents.filter(a => a.status === 'running').length;
    catHtml += `<div class="category-section">
      <div class="category-header">
        <h2>${CATEGORY_LABELS[cat] || cat}</h2>
        <span class="badge">${running} active / ${catAgents.length} total</span>
      </div>
      <div class="agent-grid">
        ${catAgents.map(a => `
          <div class="agent-card">
            <div class="top-row">
              <span class="system-name">${a.systemName}</span>
              <span class="status-badge ${a.status}">${a.status}</span>
            </div>
            <div class="task">${a.currentTask || '—'}</div>
            <div class="progress-bar"><div class="progress-fill" style="width:${a.progress || 0}%"></div></div>
            <div class="meta">
              <span>Agent: ${a.agentId || '—'}</span>
              <span>${a.progress || 0}%</span>
            </div>
          </div>
        `).join('')}
      </div>
    </div>`;
  });
  document.getElementById('categories-container').innerHTML = catHtml;

  // Log
  if (data.log && data.log.length > 0) {
    const logHtml = data.log.slice(-20).reverse().map(l =>
      `<div class="log-entry">
        <span class="log-time">${l.time || '--:--'}</span>
        <span class="log-agent">${l.agent || '—'}</span>
        <span class="log-msg">${l.message || ''}</span>
      </div>`
    ).join('');
    document.getElementById('activity-log').innerHTML = logHtml;
  }
}

async function loop() {
  const data = await fetchStatus();
  renderDashboard(data);
}

loop();
setInterval(loop, 5000);
</script>
</body>
</html>
